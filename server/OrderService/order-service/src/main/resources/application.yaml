spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://localhost:5432/NutriHubOrderDb
    username: postgres
    password: Admin@123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

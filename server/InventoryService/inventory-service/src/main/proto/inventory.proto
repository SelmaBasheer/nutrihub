syntax = "proto3";

option java_package = "com.nutrihub.inventoryservice.grpc";
option java_outer_classname = "InventoryProto";
option csharp_namespace = "NutriHub.CatalogService.Grpc";

package inventory;

service InventoryGrpcService {
  rpc CreateInventoryFromProduct (CreateInventoryRequest)
      returns (CreateInventoryResponse);
}

message CreateInventoryRequest {
  string product_id = 1;
  string product_name = 2;
  int32 quantity = 3;
}

message CreateInventoryResponse {
  string inventory_id = 1;
  bool success = 2;
  string message = 3;
}